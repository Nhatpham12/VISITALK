<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thông tin cá nhân</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!--Navbar-->
    <div class="Navbar">
      <a><img src="../../Images/Arrow.png" class="brand" /></a>
      <a href="../Home/index.html"
        ><img src="../../Images/Brand.png" class="brand"
      /></a>
      <a href="../Introduce/index.html"
        ><button class="Introduce">GIỚI THIỆU CHUNG</button></a
      >
      <a href="../Translate/index.html"
        ><button class="Translate">DỊCH THUẬT</button></a
      >
      <a href="../Learning/index.html"
        ><button class="Learning">TỪ ĐIỂN</button></a
      >
      <a href="../Asking/index.html"
        ><button class="Asking">GIẢI ĐÁP</button></a
      >
      <a href="../Personal/index.html"
        ><img src="../../Images/Personal.png" class="Personal"
      /></a>
      <a><img src="../../Images/Setting.png" class="setting" /></a>
    </div>

    <div class="main-content">
      <div class="content-wrapper">
        <h1>THÔNG TIN CÁ NHÂN</h1>
        <!--Phần hiển thị thông tin-->
        <div class="form-group">
          <!--Tên đăng nhập-->
          <div class="field">
            <label for="fullname">Họ và tên</label>
            <div class="input-wrapper">
              <input type="text" id="fullname" placeholder="" />
            </div>
          </div>
          <!--Ngày tháng năm sinh-->
          <div class="field">
            <label for="DoB">Ngày tháng năm sinh</label>
            <div class="input-wrapper">
              <input type="text" id="DoB" placeholder="" />
            </div>
          </div>

          <!--Giới tính-->
          <div class="field">
            <label for="sex">Giới tính</label>
            <div class="input-wrapper">
              <input type="text" id="sex" placeholder="" />
            </div>
          </div>

          <!--Email-->
          <div class="field">
            <label for="Email">Email</label>
            <div class="input-wrapper">
              <input type="text" id="Email" placeholder="" />
            </div>
          </div>

          <!--Tên đăng nhập-->
          <div class="field">
            <label for="username">Tên đăng nhập</label>
            <div class="input-wrapper">
              <input type="text" id="username" placeholder="" />
            </div>
          </div>
        </div>
      </div>

      <!--Panel bên phải-->
      <div class="right-panel">
        <div class="avatar"></div>
        <div class="change-del-avt">
          <button id="change-avt">Đổi ảnh đại diện</button>
          <button id="del-avt">Xóa ảnh đại diện</button>
        </div>
        <div class="change-inf">
          <button id="change">Thay đổi thông tin cá nhân</button>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
