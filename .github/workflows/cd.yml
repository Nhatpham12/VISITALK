name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, master]

env:
  REGISTRY: ghcr.io

jobs:
  push-backend:
    name: Push Backend to GHCR
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/nhatpham12/visitalk-backend:latest
            ${{ env.REGISTRY }}/nhatpham12/visitalk-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push-frontend:
    name: Push Frontend to GHCR
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/nhatpham12/visitalk-frontend:latest
            ${{ env.REGISTRY }}/nhatpham12/visitalk-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL || '/api' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    needs: [push-backend, push-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write .env.prod to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            mkdir -p /opt/visitalk
            cat <<'ENVEOF' > /opt/visitalk/.env.prod
            ${{ secrets.ENV_FILE_PROD }}
            ENVEOF
            echo "DOMAIN_NAME=${{ secrets.DOMAIN_NAME }}" >> /opt/visitalk/.env.prod
            echo "=== .env.prod on server ==="
            cat /opt/visitalk/.env.prod

      - name: Copy deploy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.prod.yml,init.sql,nginx-host.conf"
          target: /opt/visitalk

      - name: Deploy containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/visitalk

            # Login GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Stop old containers
            docker compose --env-file .env.prod -f docker-compose.prod.yml down 2>/dev/null || true

            # Pull images
            docker compose --env-file .env.prod -f docker-compose.prod.yml pull

            # Start containers
            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d

            # Cleanup
            docker image prune -f

      - name: Health check + Debug
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            echo "=== Waiting 20s for containers ==="
            sleep 20

            echo "=== .env.prod on server ==="
            cat /opt/visitalk/.env.prod

            echo "=== Container Status ==="
            cd /opt/visitalk
            docker compose --env-file .env.prod -f docker-compose.prod.yml ps -a

            echo "=== MySQL Logs ==="
            docker logs visitalk-db --tail 30 2>&1

            echo "=== Backend Logs ==="
            docker logs visitalk-backend --tail 30 2>&1

            echo "=== Frontend Logs ==="
            docker logs visitalk-frontend --tail 20 2>&1

            echo "=== Checking Backend (port 5001) ==="
            for i in $(seq 1 10); do
              if curl -sf http://127.0.0.1:5001 > /dev/null 2>&1; then
                echo "Backend is ready"
                break
              fi
              echo "Waiting for Backend... ($i/10)"
              sleep 5
            done

            echo "=== Checking Frontend (port 3080) ==="
            for i in $(seq 1 10); do
              if curl -sf http://127.0.0.1:3080 > /dev/null 2>&1; then
                echo "Frontend is ready"
                break
              fi
              echo "Waiting for Frontend... ($i/10)"
              sleep 3
            done

            echo "=== Checking nginx host (port 80) ==="
            for i in $(seq 1 10); do
              if curl -sf -H "Host: ${{ secrets.DOMAIN_NAME }}" http://127.0.0.1:80 > /dev/null 2>&1; then
                echo "nginx is ready"
                break
              fi
              echo "Waiting for nginx... ($i/10)"
              sleep 3
            done

            echo "=== nginx status ==="
            sudo systemctl status nginx --no-pager -l 2>&1 || true
