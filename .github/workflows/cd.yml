name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, master]

env:
  REGISTRY: ghcr.io

jobs:
  push-backend:
    name: Push Backend to GHCR
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/nhatpham12/visitalk-backend:latest
            ${{ env.REGISTRY }}/nhatpham12/visitalk-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push-frontend:
    name: Push Frontend to GHCR
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/nhatpham12/visitalk-frontend:latest
            ${{ env.REGISTRY }}/nhatpham12/visitalk-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL || '/api' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    needs: [push-backend, push-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write .env.prod to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            mkdir -p /opt/visitalk
            printf '%s' "${{ secrets.ENV_FILE_PROD }}" > /opt/visitalk/.env.prod

      - name: Copy deploy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.prod.yml,init.sql"
          target: /opt/visitalk

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/visitalk

            # Login GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull images
            docker compose -f docker-compose.prod.yml pull

            # Restart services
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Cleanup old images
            docker image prune -f

      - name: Health check containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            echo "=== Waiting for containers to start ==="
            sleep 15

            echo "=== Container Status ==="
            docker compose -f /opt/visitalk/docker-compose.prod.yml ps

            echo "=== Checking MySQL (port 3307) ==="
            for i in $(seq 1 30); do
              if docker exec visitalk-db mysqladmin ping -h localhost -u root -p$(grep MYSQL_ROOT_PASSWORD /opt/visitalk/.env.prod | cut -d= -f2) --silent 2>/dev/null; then
                echo "MySQL is ready"
                break
              fi
              echo "Waiting for MySQL... ($i/30)"
              sleep 5
            done

            echo "=== Checking Backend (port 5001) ==="
            for i in $(seq 1 20); do
              if curl -sf http://localhost:5001 > /dev/null 2>&1; then
                echo "Backend is ready"
                break
              fi
              echo "Waiting for Backend... ($i/20)"
              sleep 5
            done

            echo "=== Checking Frontend (port 80) ==="
            for i in $(seq 1 10); do
              if curl -sf http://localhost:80 > /dev/null 2>&1; then
                echo "Frontend is ready"
                break
              fi
              echo "Waiting for Frontend... ($i/10)"
              sleep 3
            done

            echo "=== Final Status ==="
            docker compose -f /opt/visitalk/docker-compose.prod.yml ps
