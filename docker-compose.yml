services:
  db:
    image: mysql:8.0
    container_name: visitalk-db
    restart: unless-stopped
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-visitalk_db}
      MYSQL_USER: ${DB_USER:-visitalk}
      MYSQL_PASSWORD: ${DB_PASS:-Visitalk@2024}
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - visitalk-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: visitalk-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-visitalk}
      DB_PASS: ${DB_PASS:-Visitalk@2024}
      DB_NAME: ${DB_NAME:-visitalk_db}
      JWT_SECRET: ${JWT_SECRET:-visitalk_secret}
      PORT: ${PORT:-5001}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:80}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-nhatpham}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-08012005}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-nhat88672@gmail.com}
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5001/api/health',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - visitalk-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: visitalk-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - visitalk-net

volumes:
  mysql_data:
    driver: local

networks:
  visitalk-net:
    driver: bridge
