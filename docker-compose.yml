services:
  # ── MySQL Database ──────────────────────────────
  db:
    image: mysql:8.0
    container_name: visitalk-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - visitalk-net
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Backend (Express + Python ML) ───────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: visitalk-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5001:5001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - visitalk-net

  # ── Frontend (Nginx) ───────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: visitalk-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - visitalk-net

networks:
  visitalk-net:
    driver: bridge

volumes:
  db_data:
