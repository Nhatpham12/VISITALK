<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VISITALK</title>
    <link rel="stylesheet" href="../CSS/Signup.css" />
  </head>
  <body>
    <!--Navbar-->
    <div class="Navbar">
      <div class="img-left">
        <img src="../Assets/Images/Arrow.png" class="brand" />
        <a href="../Pages/Home.html"
          ><img src="../Assets/Images/Brand.png" class="brand"
        /></a>
      </div>
      <div class="img-right">
        <img src="../Assets/Images/Setting.png" class="setting" />
      </div>
    </div>
    <div class="form-container">
      <div class="title">
        <h1>CHÀO MỪNG BẠN ĐẾN VỚI</h1>
        <img src="../Assets/Images/Brand.png" class="brand-main" />
      </div>

      <!--Nhập thông tin-->
      <div class="form-group">
        <!--Tên đăng nhập-->
        <div class="field">
          <label for="fullname">Họ và tên</label>
          <div class="input-wrapper">
            <input type="text" id="fullname" placeholder="" />
          </div>
        </div>
        <!--Ngày tháng năm sinh-->
        <div class="field">
          <label for="DoB">Ngày tháng năm sinh</label>
          <div class="input-wrapper">
            <input type="text" id="DoB" placeholder="" />
          </div>
        </div>

        <!--Email-->
        <div class="field">
          <label for="Email">Email</label>
          <div class="input-wrapper">
            <input type="text" id="Email" placeholder="" />
          </div>
        </div>

        <!--Tên đăng nhập-->
        <div class="field">
          <label for="username">Tên đăng nhập</label>
          <div class="input-wrapper">
            <input type="text" id="username" placeholder="" />
          </div>
        </div>

        <!--Mật khẩu-->
        <div class="field">
          <label for="password">Mật khẩu</label>
          <div class="input-wrapper">
            <input type="text" id="password" placeholder="" />
          </div>
        </div>

        <!--Nhập lại mật khẩu-->
        <div class="field">
          <label for="pass2">Nhập lại mật khẩu</label>
          <div class="input-wrapper">
            <input type="text" id="pass2" placeholder="" />
          </div>
        </div>
      </div>

      <!--Nút đăng ký-->
      <div class="sign-up-but">
        <button id="sign-up">Đăng ký</button>
      </div>

      <!--Đã có tài khoản-->
      <div class="al-account">
        <h5>Bạn đã có tài khoản?</h5>
        <a href="../Pages/Login.html"><b>Đăng nhập ngay</b></a>
      </div>
    </div>
    <script src="api.js"></script>
    <script src="Signup.js"></script>
  </body>
</html>
