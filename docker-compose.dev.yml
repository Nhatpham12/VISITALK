services:
  db:
    image: mysql:8.0
    container_name: visitalk-db-dev
    restart: unless-stopped
    volumes:
      - mysql_data_dev:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-visitalk_db}
      MYSQL_USER: ${DB_USER:-visitalk}
      MYSQL_PASSWORD: ${DB_PASS:-Visitalk@2024}
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - visitalk-dev-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: visitalk-backend-dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-visitalk}
      DB_PASS: ${DB_PASS:-Visitalk@2024}
      DB_NAME: ${DB_NAME:-visitalk_db}
      JWT_SECRET: ${JWT_SECRET:-visitalk_secret}
      PORT: ${PORT:-5001}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-nhatpham}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-08012005}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-nhat88672@gmail.com}
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "5001:5001"
    networks:
      - visitalk-dev-net

  frontend:
    image: node:20-alpine
    container_name: visitalk-frontend-dev
    working_dir: /app
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:5001/api
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    networks:
      - visitalk-dev-net

volumes:
  mysql_data_dev:
    driver: local

networks:
  visitalk-dev-net:
    driver: bridge
