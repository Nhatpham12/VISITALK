services:
  # ── Reverse Proxy (Auto SSL) ─────────────────────
  nginx-proxy:
    image: nginxproxy/nginx-proxy
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - certs:/etc/nginx/certs
      - html:/usr/share/nginx/html
      - vhost:/etc/nginx/vhost.d
    networks:
      - visitalk-net

  # ── Auto SSL Certificate (Let's Encrypt) ────────
  acme-companion:
    image: nginxproxy/acme-companion
    container_name: acme-companion
    restart: unless-stopped
    depends_on:
      - nginx-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - certs:/etc/nginx/certs
      - acme:/etc/acme.sh
      - vhost:/etc/nginx/vhost.d
    environment:
      - DEFAULT_EMAIL=${ADMIN_EMAIL}

  # ── MySQL Database ──────────────────────────────
  db:
    image: mysql:8.0
    container_name: visitalk-db
    restart: unless-stopped
    env_file:
      - .env.prod
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - visitalk-net
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Backend (Express + Python ML) ───────────────
  backend:
    image: ghcr.io/nhatpham12/visitalk-backend:latest
    container_name: visitalk-backend
    restart: unless-stopped
    env_file:
      - .env.prod
    ports:
      - "5001:5001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - visitalk-net

  # ── Frontend (Nginx) ───────────────────────────
  frontend:
    image: ghcr.io/nhatpham12/visitalk-frontend:latest
    container_name: visitalk-frontend
    restart: unless-stopped
    expose:
      - "80"
    labels:
      - "VIRTUAL_HOST=${DOMAIN_NAME}"
      - "LETSENCRYPT_HOST=${DOMAIN_NAME}"
    depends_on:
      - backend
    networks:
      - visitalk-net

networks:
  visitalk-net:
    driver: bridge

volumes:
  db_data:
  certs:
  html:
  vhost:
  acme:
