services:
  # ── MySQL Database ──────────────────────────────
  db:
    image: mysql:8.0
    container_name: visitalk-db
    restart: unless-stopped
    env_file:
      - .env.prod
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - visitalk-net
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Backend (Express + Python ML) ───────────────
  backend:
    image: ghcr.io/nhatpham12/visitalk-backend:latest
    container_name: visitalk-backend
    restart: unless-stopped
    env_file:
      - .env.prod
    ports:
      - "127.0.0.1:5001:5001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - visitalk-net
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:5001"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Frontend (Nginx) ───────────────────────────
  frontend:
    image: ghcr.io/nhatpham12/visitalk-frontend:latest
    container_name: visitalk-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - visitalk-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  visitalk-net:
    driver: bridge

volumes:
  db_data:
